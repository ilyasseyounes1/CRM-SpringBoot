name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: minicrm
          MYSQL_USER: minicrm_user
          MYSQL_PASSWORD: minicrm_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u minicrm_user -pminicrm_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -u minicrm_user -pminicrm_pass --silent; do
            echo "Waiting for MySQL..."; sleep 3;
          done

      - name: Init database schema
        run: mysql -h 127.0.0.1 -u minicrm_user -pminicrm_pass minicrm < database/init.sql

      - name: Build and run tests
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: minicrm
          DB_USER: minicrm_user
          DB_PASSWORD: minicrm_pass
          JWT_SECRET: ci-secret-key-at-least-256-bits-long-for-testing-only
        run: mvn clean verify --no-transfer-progress

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
